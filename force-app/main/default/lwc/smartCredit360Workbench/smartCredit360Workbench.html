<template>
    <lightning-card title="SmartCredit 360 Workbench" icon-name="standard:calibration">
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">US Lending Compliance</p>
                <h2>{headline}</h2>
                <p class="summary">{summary}</p>
            </section>

            <section class="grid">
                <article class="metric">
                    <span class="label">Decision</span>
                    <strong>{decisionLabel}</strong>
                </article>
                <article class="metric">
                    <span class="label">DTI</span>
                    <strong>{dtiLabel}</strong>
                </article>
                <article class="metric">
                    <span class="label">LTV</span>
                    <strong>{ltvLabel}</strong>
                </article>
                <article class="metric">
                    <span class="label">FICO</span>
                    <strong>{ficoLabel}</strong>
                </article>
            </section>

            <section class="reportZone">
                <article class="reportCard spotlight">
                    <span class="label">Composite Score</span>
                    <div class="scoreLine">
                        <strong>{compositeScore}</strong>
                        <span class="pill">{scoreGrade}</span>
                    </div>
                    <p>{scoreNarrative}</p>
                </article>

                <article class="reportCard">
                    <span class="label">Findex / FICO Report</span>
                    <strong>{resolvedReportReference}</strong>
                    <p>{resolvedReportSummary}</p>
                </article>
            </section>

            <section class="checklist">
                <template for:each={checkItems} for:item="item">
                    <div key={item.label} class={item.className}>
                        <span>{item.label}</span>
                        <strong>{item.value}</strong>
                    </div>
                </template>
            </section>

            <section class="logs">
                <div class="logHeader">
                    <span class="label">Error Logs</span>
                    <strong>{logCountLabel}</strong>
                </div>

                <template for:each={logItems} for:item="item">
                    <article key={item.key} class={item.className}>
                        <div>
                            <span class="logSeverity">{item.severity}</span>
                            <strong>{item.area}</strong>
                        </div>
                        <p>{item.message}</p>
                    </article>
                </template>
            </section>
        </div>
    </lightning-card>
</template>
